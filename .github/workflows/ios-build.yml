name: iOS Build (unsigned IPA)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build unsigned IPA
    runs-on: macos-14
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Pub get
        run: flutter pub get

      - name: Pod install
        working-directory: ios
        run: |
          pod repo update
          pod install

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        run: |
          mkdir -p build/ios/ipa-unsigned/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa-unsigned/Payload/Runner.app
          cd build/ios/ipa-unsigned
          zip -qr ../../../ozon_bank-unsigned.ipa Payload
          cd -
          ls -lh ozon_bank-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ozon_bank-unsigned-ipa
          path: ozon_bank-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
